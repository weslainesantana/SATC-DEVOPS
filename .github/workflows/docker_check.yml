name: Docker Image Check

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

jobs:
  docker-check:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # 📥 Checkout do código
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔧 Setup Node (necessário pro Sonar)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 📦 Instalar dependências
      - name: Install dependencies
        working-directory: devops-front
        run: npm install

      # 🧪 Testes (não quebra se não existir)
      - name: Run tests
        working-directory: devops-front
        run: npm run test --if-present

      # 🔍 SonarQube
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.projectKey=SATC-DEVOPS
            -Dsonar.organization=Wes
            -Dsonar.sources=devops-front/src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**

      # 🐳 Login no Docker Hub (igual você já tinha)
      - name: Set up Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build da imagem
      - name: Docker build
        run: docker build -f dockerfile -t ${{ secrets.DOCKER_USERNAME }}/satc-devops:latest .

      # 🐳 Push da imagem
      - name: Docker push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/satc-devops:latest